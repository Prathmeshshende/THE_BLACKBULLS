services:
  - type: web
    name: the-blackbulls-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ADMIN_EMAILS
        value: demo@example.com,admin@example.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_STT_MODEL
        value: gpt-4o-mini-transcribe
      - key: STT_ENABLE_PLACEHOLDER_FALLBACK
        value: "true"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

databases:
  - name: the-blackbulls-db
    databaseName: the_blackbulls
    user: the_blackbulls_user
